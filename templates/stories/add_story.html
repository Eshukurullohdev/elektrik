<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Story qo‘shish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
        }

        .upload-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(139, 92, 246, 0.15);
        }

        .file-input-wrapper {
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .file-input-wrapper:active {
            transform: scale(0.98);
        }

        /* Fayl tanlash inputini chiroyli qilish */
        input[type="file"]::file-selector-button {
            background: #8b5cf6;
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-tr from-purple-500 to-pink-500 rounded-[28px] shadow-xl shadow-purple-100 mb-4 transform rotate-3">
                <i class="fas fa-camera-retro text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Yangi Story</h1>
            <p class="text-gray-500 mt-2 font-medium">Mijozlar uchun yangilik yoki aksiyalarni ulashing</p>
        </div>

        <form method="post" enctype="multipart/form-data" class="upload-card p-8 space-y-6 border border-white">
            {% csrf_token %}

            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-700 ml-1 italic">
                    <i class="fas fa-image mr-1 text-purple-500"></i> Rasm (Story uchun)
                </label>
                <div class="file-input-wrapper bg-purple-50 border-2 border-dashed border-purple-200 rounded-2xl p-4 hover:border-purple-400 transition-colors">
                    <input type="file" name="image" accept="image/*"
                           class="w-full text-sm text-gray-500 file:text-xs">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-700 ml-1 italic">
                    <i class="fas fa-video mr-1 text-pink-500"></i> Video (Ixtiyoriy)
                </label>
                <div class="file-input-wrapper bg-pink-50 border-2 border-dashed border-pink-200 rounded-2xl p-4 hover:border-pink-400 transition-colors">
                    <input type="file" name="video" accept="video/*"
                           class="w-full text-sm text-gray-500 file:text-xs">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit"
                        class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-4 rounded-2xl text-lg font-black shadow-lg shadow-purple-200 hover:shadow-purple-300 active:scale-95 transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-cloud-upload-alt"></i> Yuklash
                </button>
            </div>
        </form>

        <a href="{% url 'dashboard' %}" class="flex items-center justify-center mt-8 text-gray-400 font-bold text-sm hover:text-purple-600 transition-colors">
            <i class="fas fa-arrow-left mr-2"></i> Dashboardga qaytish
        </a>

        <div class="mt-8 p-4 bg-white/50 rounded-2xl border border-white/80 text-center">
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-[2px]">
                Tavsiya etiladigan o'lcham: 1080x1920 (9:16)
            </p>
        </div>
    </div>

</body>
</html>
