<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Skroll barni yashirish */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .story-ring {
            padding: 3px;
            background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
            border-radius: 24px;
        }

        .story-card {
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .story-card:active {
            transform: scale(0.92);
        }

        .video-container video {
            object-fit: cover;
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body class="bg-gray-50">

<div class="py-6">
    <div class="px-5 mb-4 flex justify-between items-center">
        <h3 class="text-sm font-black text-gray-400 uppercase tracking-[2px]">Yangiliklar</h3>
        <span class="text-[10px] bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full font-bold">LIVE</span>
    </div>

    <div class="flex overflow-x-auto space-x-4 px-5 no-scrollbar">
        {% for story in stories %}
        <div class="min-w-[100px] flex flex-col items-center">
            
            <div class="story-card w-[86px] h-[116px] mb-2">
                <div class="story-ring h-full w-full shadow-lg shadow-pink-100/50">
                    <div class="bg-white h-full w-full rounded-[21px] overflow-hidden border-2 border-white relative">
                        
                        {% if story.image %}
                            <img src="{{ story.image.url }}" class="w-full h-full object-cover">
                        {% elif story.video %}
                            <div class="video-container h-full w-full bg-black">
                                <video class="w-full h-full" muted loop playsinline>
                                    <source src="{{ story.video.url }}">
                                </video>
                                <div class="absolute inset-0 flex items-center justify-center bg-black/20">
                                    <i class="fas fa-play text-white text-xs opacity-80"></i>
                                </div>
                            </div>
                        {% endif %}

                        <div class="absolute bottom-0 left-0 right-0 p-1.5 bg-gradient-to-t from-black/60 to-transparent">
                            <div class="w-5 h-5 bg-white rounded-full flex items-center justify-center mx-auto border border-white shadow-sm">
                                <i class="fas fa-user text-[8px] text-gray-400"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <p class="text-[10px] font-bold text-gray-700 w-full truncate text-center px-1">
                {{ story.user.phone|slice:"-4:" }}...
            </p>
        </div>
        {% empty %}
        <div class="flex items-center justify-center w-full py-4 text-gray-300 italic text-sm">
            Hozircha hikoyalar yo'q
        </div>
        {% endfor %}
    </div>
</div>

<script>
    // Videolarni auto-preview qilish (hover yoki ko'rinishga kirganda)
    document.querySelectorAll('video').forEach(v => {
        v.addEventListener('mouseover', () => v.play());
        v.addEventListener('mouseout', () => v.pause());
    });
</script>

</body>
</html>
