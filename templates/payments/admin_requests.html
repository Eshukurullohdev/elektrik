<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To‘lov so‘rovlari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .request-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .request-card:hover { transform: translateY(-2px); box-shadow: 0 12px 25px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="pb-10">
    <a href="{% url 'dashboard' %}" 
           class="block w-full bg-slate-50 text-slate-500 text-center py-3.5 rounded-[22px] font-bold text-xs uppercase tracking-wider border border-slate-100 hover:bg-slate-100 hover:text-slate-700 active:scale-[0.99] transition-all duration-200 flex items-center justify-center gap-2">
            <i class="fas fa-house text-[11px] opacity-70"></i>
            <span>Dashboardga qaytish</span>
        </a>
    <div class="sticky top-0 bg-white/80 backdrop-blur-md border-b p-4 z-50 flex justify-between items-center">
        
        <h1 class="text-xl font-extrabold text-gray-800">To‘lov so‘rovlari</h1>
        <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-xs font-bold">
            Jami: {{ requests|length }}
        </span>
    </div>

    <div class="p-4 space-y-4 max-w-2xl mx-auto">
        
        {% for req in requests %}
        <div class="bg-white rounded-[24px] overflow-hidden shadow-sm border border-gray-100 request-card">
            
            <div class="p-5">
                <div class="flex justify-between items-start mb-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600">
                            <i class="fas fa-user"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-gray-800">{{ req.user.phone }}</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">{{ req.created_at|date:"d-M, H:i" }}</p>
                        </div>
                    </div>
                    

                </div>



                <div class="relative group cursor-pointer" onclick="openModal('{{ req.screenshot.url }}')">
                    <img src="{{ req.screenshot.url }}" class="w-full h-48 object-cover rounded-2xl border border-gray-100">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded-2xl text-white text-sm font-bold">
                        <i class="fas fa-expand mr-2"></i> Kattalashtirish
                    </div>
                </div>


            </div>

        </div>
        {% empty %}
        <div class="text-center py-20">
            <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300 text-3xl">
                <i class="fas fa-inbox"></i>
            </div>
            <p class="text-gray-400 font-bold">Hozircha yangi so‘rovlar yo‘q</p>
        </div>
        {% endfor %}

    </div>

    <div id="imageModal" class="fixed inset-0 bg-black/90 z-[100] hidden items-center justify-center p-4" onclick="closeModal()">
        <img id="modalImg" src="" class="max-w-full max-h-full rounded-lg shadow-2xl">
        <button class="absolute top-6 right-6 text-white text-2xl">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <script>
        function openModal(url) {
            document.getElementById('modalImg').src = url;
            document.getElementById('imageModal').classList.remove('hidden');
            document.getElementById('imageModal').classList.add('flex');
        }
        function closeModal() {
            document.getElementById('imageModal').classList.add('hidden');
            document.getElementById('imageModal').classList.remove('flex');
        }
    </script>

</body>
</html>
