<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>To'lov qo'shish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
        }

        /* Form ichidagi inputlarni chiroyli qilish */
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid #f3f4f6;
            outline: none;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        input:focus {
            border-color: #6366f1;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
            font-size: 0.9rem;
        }

        p {
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body class="min-h-screen flex items-end sm:items-center justify-center p-4">

    <div class="glass-card shadow-2xl w-full max-w-md p-8 mb-4 sm:mb-0 transform transition-all">
        <a href="{% url 'dashboard' %}" 
           class="block w-full bg-slate-50 text-slate-500 text-center py-3.5 rounded-[22px] font-bold text-xs uppercase tracking-wider border border-slate-100 hover:bg-slate-100 hover:text-slate-700 active:scale-[0.99] transition-all duration-200 flex items-center justify-center gap-2">
            <i class="fas fa-house text-[11px] opacity-70"></i>
            <span>Dashboardga qaytish</span>
        </a>
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-2xl shadow-lg mb-4 text-white text-2xl">
                <i class="fas fa-wallet"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-gray-800 tracking-tight">To'lov qo'shish</h2>
            <p class="text-gray-500 text-sm mt-1">Mijoz hisobiga mablag' kiriting</p>
        </div>

        <form method="post" class="space-y-2">
            {% csrf_token %}
            
            <div class="django-form-container">
                {{ form.as_p }}
            </div>
            
            <div class="pt-4">
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 rounded-2xl shadow-blue-200 shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all duration-200">
                    <i class="fas fa-plus-circle mr-2"></i> To'lovni tasdiqlash
                </button>
            </div>
        </form>

        <div class="mt-6 text-center">
            <a href="{% url 'dashboard' %}" class="inline-flex items-center text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition">
                <i class="fas fa-arrow-left mr-2"></i> Dashboardga qaytish
            </a>
        </div>
    </div>

    <div class="fixed top-0 left-0 w-full h-1 bg-white/20"></div>

</body>
</html>
