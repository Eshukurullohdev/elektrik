<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashback Yechish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen pt-10 px-4">

<div class="max-w-md mx-auto">
    <div class="mb-6">
        <h2 class="text-2xl font-black text-gray-900">Cashback yechish</h2>
        <p class="text-sm text-gray-500 font-medium">Mijoz hisobidan mablag‘ ayirish</p>
    </div>

    <form method="post" class="bg-white rounded-[32px] p-6 shadow-xl shadow-gray-200 border border-gray-100">
        {% csrf_token %}

        <div class="mb-5">
            <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-1">Mijozni tanlang</label>
            <select name="user_id" class="w-full bg-gray-50 border-none rounded-2xl py-4 px-4 mt-2 font-bold text-gray-800 focus:ring-2 focus:ring-indigo-500 transition-all appearance-none">
                {% for u in users %}
                    <option value="{{ u.id }}">
                        {{ u.phone }} ({{ u.cashback_balance }} so‘m mavjud)
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-6">
            <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-1">Summa (so'mda)</label>
            <div class="relative mt-2">
                <i class="fas fa-coins absolute left-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                <input type="number" name="amount" required
                       class="w-full bg-gray-50 border-none rounded-2xl py-4 pl-12 pr-4 font-bold text-lg text-gray-900 focus:ring-2 focus:ring-emerald-500 transition-all"
                       placeholder="0">
            </div>
        </div>

        <button type="submit" 
                class="w-full bg-gradient-to-r from-red-500 to-red-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-red-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <i class="fas fa-money-bill-wave"></i> Mablag'ni yechish
        </button>
    </form>

    <div class="mt-6 p-4 bg-amber-50 rounded-2xl border border-amber-100 flex items-start gap-3">
        <i class="fas fa-exclamation-triangle text-amber-500 mt-1"></i>
        <p class="text-[11px] text-amber-800 font-bold leading-relaxed">
            Diqqat: Cashback yechish qaytarib bo'lmaydigan operatsiya. Iltimos, ma'lumotlarni tekshirib keyin tasdiqlang.
        </p>
    </div>

    <a href="{% url 'dashboard' %}" class="block mt-6 text-center text-gray-400 font-bold text-sm hover:text-gray-600 transition">
        <i class="fas fa-arrow-left mr-1"></i> Orqaga
    </a>
</div>

</body>
</html>
