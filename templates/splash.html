<!DOCTYPE html>
<html lang="uz">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuklanmoqda...</title>

    <!-- TAILWIND & FONT AWESOME -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            overflow: hidden;
        }

        /* Elementlarning mayin chiqishi */
        @keyframes fadeUp {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Chiziqli progress bar animatsiyasi */
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .animate-fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .progress-fill {
            animation: progress 2.8s linear forwards;
        }
    </style>
</head>

<body class="flex flex-col items-center justify-between h-screen py-12 antialiased">

    <!-- ASOSIY LOGO VA MATN -->
    <div class="flex-1 flex flex-col items-center justify-center text-center">
        
        <!-- LOGO (Atrofida aylanma porlovchi yuklanish chizig'i bilan) -->
        <div class="relative w-28 h-28 flex items-center justify-center animate-fade-up">
            <!-- Tashqi aylanma spinner -->
            <div class="absolute inset-0 rounded-[32px] border-2 border-indigo-500/20 border-t-indigo-500 animate-spin" style="animation-duration: 1.5s;"></div>
            
            <!-- Ichki gradient quti va rasm -->
            <div class="w-24 h-24 rounded-[26px] bg-gradient-to-br from-indigo-500 to-purple-600 p-0.5 shadow-[0_0_50px_rgba(99,102,241,0.2)]">
                <img class="w-full h-full rounded-[24px] object-cover" 
                     src="{% static 'img/logo.jpg' %}" 
                     alt="Logo"
                     onerror="this.onerror=null; this.src='https://img.icons8.com/fluency/96/lightning-bolt.png';">
            </div>
        </div>

        <!-- BREND NOMI -->
        <h1 class="text-white text-3xl font-black mt-8 tracking-tight animate-fade-up" style="animation-delay: 0.1s;">
            Elektrikjan
        </h1>

        <!-- SUBTITLE -->
        <p class="text-indigo-400 text-xs mt-2 font-black tracking-[0.3em] uppercase opacity-90 animate-fade-up" style="animation-delay: 0.2s;">
            Avto Tizim
        </p>

    </div>

    <!-- PAShQI YUKLANISh LINIYASI VA VERSIYA -->
    <div class="w-full max-w-[200px] flex flex-col items-center gap-4 animate-fade-up" style="animation-delay: 0.3s;">
        
        <!-- Silliq to'ladigan chiziq -->
        <div class="w-full h-[3px] bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 progress-fill rounded-full shadow-[0_0_10px_rgba(99,102,241,0.5)]"></div>
        </div>

        <!-- Kichik xavfsizlik matni -->
        <span class="text-[9px] font-bold text-slate-500 tracking-widest uppercase font-mono">
            Xavfsiz ulanish...
        </span>
        
    </div>

    <!-- SCRIPT (Dashboardga avto-o'tish) -->
    <script>
        // Exactly 3 sekunddan keyin o'tadi
        setTimeout(() => {
            window.location.href = "{% url 'dashboard' %}";
        }, 3000);
    </script>

</body>
</html>
