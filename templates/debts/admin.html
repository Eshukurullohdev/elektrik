<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qarzlar Boshqaruvi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        .premium-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }
        
        .input-style {
            background-color: #f1f5f9;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }
        
        .input-style:focus {
            background-color: #fff;
            border-color: #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body class="p-4 pb-20">

<div class="max-w-md mx-auto space-y-8">
    <div class="flex items-center justify-between pt-4 px-1">
        <div>
       
            <h1 class="text-2xl font-black tracking-tight text-gray-900">Qarzlar</h1>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Admin boshqaruvi</p>
        </div>
        <div class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center text-red-500">
            <i class="fas fa-hand-holding-dollar text-xl"></i>
        </div>
           
    </div>
  <a href="{% url 'dashboard' %}">
                orqaga
            </a>
    <div class="premium-card p-6 rounded-[32px] shadow-xl shadow-gray-200/50">
        <h2 class="text-sm font-black text-gray-800 mb-5 flex items-center gap-2">
            <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
            Yangi qarz kiritish
        </h2>

        <form method="post" class="space-y-3">
            {% csrf_token %}

            <select name="user_id" class="w-full input-style p-4 rounded-2xl text-sm font-bold outline-none appearance-none">
                <option value="">-- Manual (Ro'yxatdan tashqari) --</option>
                {% for u in users %}
                    <option value="{{ u.id }}">{{ u.phone }}</option>
                {% endfor %}
            </select>

            <div class="grid grid-cols-2 gap-3">
                <input type="text" name="name" placeholder="Ism" class="input-style p-4 rounded-2xl text-sm font-bold outline-none">
                <input type="text" name="phone" placeholder="Telefon" class="input-style p-4 rounded-2xl text-sm font-bold outline-none">
            </div>

            <div class="relative">
                <input type="number" name="amount" placeholder="Summa" class="w-full input-style p-4 pl-12 rounded-2xl text-lg font-black text-red-600 outline-none" required>
                <i class="fas fa-coins absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
            </div>

            <textarea name="description" placeholder="Izoh (nima uchun qarz?)" class="w-full input-style p-4 rounded-2xl text-sm font-medium outline-none h-24 resize-none"></textarea>

            <button class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black text-sm shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                <i class="fas fa-save opacity-50"></i> SAQLASH
            </button>
        </form>
    </div>

    <div class="space-y-4">
        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest px-1">Faol qarzlar</h3>
        
        {% for d in debts %}
        <div class="premium-card p-5 rounded-[28px] shadow-sm border border-white relative overflow-hidden group">
            <div class="absolute -right-4 -top-4 w-20 h-20 bg-red-50 rounded-full opacity-50 group-hover:scale-110 transition-transform"></div>

            <div class="relative">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <div class="font-extrabold text-gray-800 text-base leading-tight">{{ d.display_name }}</div>
                        <div class="text-[10px] text-gray-400 font-bold mt-1 uppercase tracking-tighter">
                            <i class="far fa-calendar-alt mr-1"></i> {{ d.created_at|date:"d-M, H:i" }}
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-red-500 font-black text-lg leading-none">-{{ d.amount }}</div>
                        <div class="text-[8px] text-gray-300 font-bold uppercase mt-1 tracking-widest text-right">so'm</div>
                    </div>
                </div>

                <div class="bg-gray-50/80 p-3 rounded-xl text-xs text-gray-600 font-medium mb-4 italic">
                    "{{ d.description }}"
                </div>

                <div class="flex items-center gap-2">
                    <form method="post" action="{% url 'debts:reduce_debt' d.id %}" class="flex-1 flex gap-2">
                        {% csrf_token %}
                        <input type="number" name="amount" placeholder="Summa" 
                               class="flex-1 bg-white border border-gray-100 p-2.5 rounded-xl text-xs font-bold focus:ring-2 focus:ring-yellow-400 outline-none shadow-sm">
                        <button class="bg-yellow-400 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-yellow-100 active:scale-90 transition">
                            <i class="fas fa-minus text-xs"></i>
                        </button>
                    </form>

                    <a href="{% url 'debts:delete_debt' d.id %}" 
                       onclick="return confirm('Qarzni to\'liq o\'chirmoqchimisiz?')"
                       class="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center border border-red-100 active:scale-90 transition">
                        <i class="fas fa-trash-can text-xs"></i>
                    </a>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="text-center py-16 bg-white/50 rounded-[32px] border-2 border-dashed border-gray-200">
            <i class="fas fa-clipboard-check text-gray-200 text-4xl mb-3"></i>
            <p class="text-gray-400 font-bold text-xs uppercase tracking-widest">Hozircha qarzlar yo'q</p>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
