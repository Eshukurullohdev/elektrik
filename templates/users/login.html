<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kirish | Cashback System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #eef2ff, #f8fafc);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 32px;
        }

        .input-group:focus-within label {
            color: #4f46e5;
        }
        
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0px 1000px white inset;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-sm">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-tr from-indigo-600 to-blue-500 rounded-[24px] shadow-xl shadow-indigo-100 mb-4 transform -rotate-3">
                <i class="fas fa-shield-alt text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Xush kelibsiz!</h1>
            <p class="text-gray-500 mt-2 font-medium">Tizimga kirish uchun ma'lumotlarni kiriting</p>
        </div>

        <div class="login-card shadow-2xl p-8 transform transition-all">
            
            {% if error %}
            <div class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-xl flex items-center gap-3 animate-pulse">
                <i class="fas fa-exclamation-circle text-red-500"></i>
                <p class="text-red-700 text-sm font-bold">{{ error }}</p>
            </div>
            {% endif %}

            <form method="post" class="space-y-6">
                {% csrf_token %}

                <div class="input-group">
                    <label for="phone" class="block mb-2 text-sm font-bold text-gray-700 ml-1 transition-colors">
                        Telefon raqam
                    </label>
                    <div class="relative">
                        <i class="fas fa-phone-alt absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" id="phone" name="phone" required placeholder="90 123 45 67"
                            class="w-full pl-11 pr-4 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:bg-white focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all text-gray-800 font-semibold">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password" class="block mb-2 text-sm font-bold text-gray-700 ml-1 transition-colors">
                        Parol
                    </label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="password" id="password" name="password" required placeholder="••••••••"
                            class="w-full pl-11 pr-4 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:bg-white focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all text-gray-800 font-semibold">
                    </div>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 hover:shadow-indigo-300 active:scale-[0.97] transition-all duration-200">
                    Kirish <i class="fas fa-arrow-right ml-2 text-sm opacity-70"></i>
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-gray-500 text-sm font-medium">
                    Hali hisobingiz yo‘qmi? 
                    <a href="{% url 'register' %}" class="text-indigo-600 font-bold hover:text-indigo-800 transition">Ro'yxatdan o'tish</a>
                </p>
            </div>
        </div>

        <p class="text-center mt-8 text-gray-400 text-xs font-semibold uppercase tracking-[2px]">
            &copy; 2026 Cashback App
        </p>
    </div>

</body>
</html>
