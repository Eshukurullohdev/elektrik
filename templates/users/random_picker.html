<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random User Picker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Confetti (salut) effekti uchun kutubxona -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #f5f3ff, #ffffff), radial-gradient(circle at bottom left, #f0fdf4, #ffffff);
        }

        @keyframes pulseBorder {
            0% { border-color: rgba(99, 102, 241, 0.2); }
            50% { border-color: rgba(99, 102, 241, 0.8); }
            100% { border-color: rgba(99, 102, 241, 0.2); }
        }
        .rolling-active {
            animation: pulseBorder 0.3s infinite;
        }
    </style>
</head>

<body class="flex items-center justify-center min-height-screen h-screen p-4">

<div class="bg-white/80 backdrop-blur-md p-8 rounded-[40px] shadow-[0_30px_100px_rgba(0,0,0,0.04)] border border-slate-100 text-center w-full max-w-sm">
<a href="{% url 'dashboard' %}" 
   class="block w-full bg-slate-50 text-slate-500 text-center py-3.5 rounded-[22px] font-bold text-xs uppercase tracking-wider border border-slate-100 hover:bg-slate-100 hover:text-slate-700 active:scale-[0.99] transition-all duration-200 flex items-center justify-center gap-2">
    <i class="fas fa-house text-[11px] opacity-70"></i>
    <span>Dashboardga qaytish</span>
</a>
    <!-- Sarlavha -->
    <div class="mb-8">
        <div id="dice-container" class="inline-flex items-center justify-center w-16 h-16 bg-indigo-50 text-indigo-600 rounded-3xl mb-4 shadow-sm">
            <i id="dice-icon" class="fas fa-dice text-2xl"></i>
        </div>
        <h1 class="text-2xl font-black text-slate-900 tracking-tight">Omadli Mijoz</h1>
        <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mt-1">Jonli Random Shousi</p>
    </div>

    <!-- Yashirin Django ma'lumotlari (JS o'qib olishi uchun) -->
    <div id="django-winner-data" 
         data-has-winner="{% if winner %}true{% else %}false{% endif %}"
         data-winner-num="{{ winner.user_number|default:'1' }}"
         data-winner-phone="{{ winner.phone }}"
         data-winner-cashback="{{ winner.cashback_balance|default:'' }}">
    </div>

    <!-- O'YIN STRUKTURASI (ANIMATSIYA MAYDONI) -->
    <div id="lottery-box" class="p-6 bg-slate-50 rounded-[32px] border-2 border-slate-100 transition-all duration-300">
        
        <!-- Baraban ichidagi kontent -->
        <div id="slot-machine-content">
            <div id="status-tag" class="flex items-center justify-center gap-1.5 text-slate-400 font-extrabold text-[10px] uppercase tracking-[2px]">
                <i class="fas fa-circle-dot text-[8px] animate-pulse"></i>
                <span id="status-text">Tugmani bosing</span>
            </div>

            <!-- Ekranda aylanadigan raqam va telefon joyi -->
<div class="mt-4">

    <div id="display-number-box"
         class="inline-flex items-center justify-center bg-white px-5 py-2 rounded-full shadow-sm border border-slate-100 min-w-[70px] h-12">

        <span id="display-number"
              class="text-3xl font-black italic tracking-tight text-slate-800">
            ?
        </span>

    </div>

    <!-- 📞 TEL LINK -->
    <a id="display-phone-link"
       href="tel:+998000000000"
       class="block text-slate-700 font-black text-lg mt-4 tracking-wide font-mono h-7 active:scale-95 transition">

        <span id="display-phone">
            +998 (--) --- -- --
        </span>

    </a>

</div>
        </div>

    </div>

    <!-- Forma va Start Tugmasi -->
    <form method="post" id="lottery-form" class="mt-6">
        {% csrf_token %}
        <button type="submit" id="start-btn"
                class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 text-white px-6 py-4 rounded-[22px] font-extrabold text-sm uppercase tracking-wider shadow-lg shadow-indigo-100 hover:shadow-indigo-200 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2 group">
            <span>Omadni Sinash</span>
            <i class="fas fa-play text-xs opacity-70"></i>
        </button>
    </form>

</div>

<!-- 🧠 JAVASCRIPT: Tez aylanish, sekinlashish va to'xtash effekti -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const form = document.getElementById('lottery-form');
        const startBtn = document.getElementById('start-btn');
        const lotteryBox = document.getElementById('lottery-box');
        const statusTag = document.getElementById('status-tag');
        const statusText = document.getElementById('status-text');
        const displayNum = document.getElementById('display-number');
        const displayPhone = document.getElementById('display-phone');
        const diceIcon = document.getElementById('dice-icon');
        
        // Djangodan kelgan haqiqiy g'olib ma'lumotlari
        const winnerData = document.getElementById('django-winner-data');
        const hasWinner = winnerData.getAttribute('data-has-winner') === 'true';
        const winnerNum = winnerData.getAttribute('data-winner-num');
        const winnerPhone = winnerData.getAttribute('data-winner-phone');
        const winnerCashback = winnerData.getAttribute('data-winner-cashback');

        // Tasodifiy soxta raqamlar generatori (aylanish paytida ko'rsatish uchun)
        function getRandomFakePhone() {
            const codes = ['90', '91', '93', '94', '95', '97', '99', '88'];
            const randomCode = codes[Math.floor(Math.random() * codes.length)];
            const randomRest = Math.floor(1000000 + Math.random() * 9000000);
            return `+998 (${randomCode}) ${String(randomRest).replace(/(\d{3})(\d{2})(\d{2})/, '$1-$2-$3')}`;
        }

        // AGAR BACKENDDAN G'OLIB KELGAN BO'LSA (Tugma bosilib sahifa yangilanganda)
        if (hasWinner) {
            // Tugmani bloklaymosiz va animatsiyani boshlaymiz
            startBtn.disabled = true;
            diceIcon.classList.add('fa-spin');
            lotteryBox.classList.add('rolling-active');
            statusText.innerText = "Baraban aylanmoqda...";
            
            let speed = 40; // Boshlang'ich juda tez tezlik (millisekundda)
            let counter = 0;
            
            function spin() {
                counter++;
                
                // Ekrandagi raqamlarni tasodifiy o'zgartirib turish
                displayNum.innerText = Math.floor(Math.random() * 50) + 1;
                displayPhone.innerText = getRandomFakePhone();
                
                // 30 ta aylanishdan keyin sekinlashishni boshlaydi
                if (counter > 30) {
                    speed += 40; // Har safar vaqt cho'ziladi (ya'ni sekinlashadi)
                }
                
                // Tezlik 400ms dan oshganda tormoz berib, haqiqiy g'olibda to'xtatadi
                if (speed > 450) {
                    clearInterval(spinner);
                    
                    // HAQIQIY G'OLIBNI EKRANGA CHIQARISH
                    displayNum.innerText = winnerNum;
                    displayPhone.innerText = winnerPhone;
                    
                    // Dizaynni g'olibona yashil gradientga o'tkazish
                    lotteryBox.className = "p-6 bg-gradient-to-b from-emerald-500 to-teal-600 rounded-[32px] text-white shadow-xl shadow-emerald-100 relative overflow-hidden scale-105 transition-all duration-500";
                    statusTag.className = "flex items-center justify-center gap-1.5 text-emerald-100 font-extrabold text-[10px] uppercase tracking-[2px]";
                    statusText.innerText = "G'olib aniqlandi!";
                    document.getElementById('display-number-box').className = "inline-flex items-center justify-center bg-white/20 backdrop-blur-sm px-5 py-2 rounded-full border border-white/20 min-w-[70px] h-12";
                    displayNum.className = "text-3xl font-black italic tracking-tight text-white";
                    displayPhone.className = "text-white font-black text-lg mt-4 tracking-wide font-mono";
                    
                    // Agar keshbek bo'lsa qo'shib qo'yamiz
                    if(winnerCashback) {
                        const cbDiv = document.createElement('div');
                        cbDiv.className = "mt-3 inline-block bg-emerald-900/20 text-emerald-100 text-[10px] font-bold px-3 py-1 rounded-lg";
                        cbDiv.innerText = `Balans: ${winnerCashback} so'm`;
                        document.getElementById('slot-machine-content').appendChild(cbDiv);
                    }

                    diceIcon.classList.remove('fa-spin');
                    startBtn.disabled = false;

                    // 🎉 CONFETTI SALUTLARINI OTISH!
                    confetti({ particleCount: 120, spread: 70, origin: { y: 0.6 } });
                } else {
                    // Sekinlashgan tezlik bilan qayta ishga tushirish
                    clearInterval(spinner);
                    spinner = setInterval(spin, speed);
                }
            }
            
            let spinner = setInterval(spin, speed);
        }
    });
</script>
</body>
</html>
