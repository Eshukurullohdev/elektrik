<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tahrirlash: {{ product.name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        .edit-input {
            background-color: #f1f5f9;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .edit-input:focus {
            background-color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Custom Toggle Switch */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #e2e8f0; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="p-4 pb-12">

<div class="max-w-md mx-auto space-y-6">

    <div class="flex items-center justify-between px-1">
        <a href="{% url 'products' %}" class="text-gray-400 hover:text-gray-600 transition">
            <i class="fas fa-chevron-left"></i>
        </a>
        <h1 class="text-lg font-black text-gray-900 tracking-tight">Tahrirlash</h1>
        <div class="w-4"></div>
    </div>

    <div class="bg-white p-7 rounded-[32px] shadow-xl shadow-gray-200/50 border border-gray-50">
        <form method="post" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-gray-400 uppercase ml-1 tracking-wider">Mahsulot nomi</label>
                <input type="text" name="name" value="{{ product.name }}" required
                       class="w-full edit-input p-4 rounded-2xl text-sm font-bold outline-none" placeholder="Nomi">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1 tracking-wider">Narxi</label>
                    <input type="number" name="price" value="{{ product.price }}" required
                           class="w-full edit-input p-4 rounded-2xl text-sm font-bold outline-none" placeholder="Narxi">
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-1 tracking-wider">Telefon</label>
                    <input type="text" name="phone" value="{{ product.phone }}" required
                           class="w-full edit-input p-4 rounded-2xl text-sm font-bold outline-none" placeholder="Aloqa">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-gray-400 uppercase ml-1 tracking-wider">Rasm (O'zgartirish ixtiyoriy)</label>
                <div class="flex items-center gap-4 bg-gray-50 p-3 rounded-2xl border border-dashed border-gray-200">
                    {% if product.image %}
                        <img src="{{ product.image.url }}" class="w-16 h-16 object-cover rounded-xl shadow-sm border border-white">
                    {% endif %}
                    <div class="flex-1">
                        <input type="file" name="image" class="text-[10px] text-gray-400 font-bold file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-black file:bg-blue-50 file:text-blue-600 hover:file:bg-blue-100 cursor-pointer">
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between bg-blue-50/50 p-4 rounded-2xl border border-blue-100/50">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center text-white text-xs">
                        <i class="fas fa-tag"></i>
                    </div>
                    <div>
                        <p class="text-[11px] font-black text-blue-900 uppercase leading-none">Sotuv holati</p>
                        <p class="text-[10px] text-blue-400 font-bold mt-1">Sotilgan bo'lsa yoqing</p>
                    </div>
                </div>
                <label class="switch">
                    <input type="checkbox" name="is_sold" {% if product.is_sold %}checked{% endif %}>
                    <span class="slider"></span>
                </label>
            </div>

            <button class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-sm shadow-lg shadow-blue-100 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                <i class="fas fa-check-circle"></i> O'ZGARISHLARNI SAQLASH
            </button>
        </form>
    </div>

    <div class="pt-4 text-center">
        <a href="{% url 'delete_product' product.id %}" onclick="return confirm('Haqiqatan ham o\'chirmoqchimisiz?')"
           class="text-[10px] font-black text-red-400 uppercase tracking-[2px] hover:text-red-600 transition">
            <i class="fas fa-trash-alt mr-1"></i> E'lonni butunlay o'chirish
        </a>
    </div>

</div>

</body>
</html>
