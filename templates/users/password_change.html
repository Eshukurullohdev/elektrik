<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parolni o‘zgartirish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        /* Django form inputlarini stilizatsiya qilish */
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 2px solid #f1f5f9;
            background-color: #f8fafc;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        input:focus {
            border-color: #6366f1;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        p {
            margin-bottom: 1.25rem;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="pb-10">

    <div class="fixed top-0 left-0 right-0 glass-nav p-4 flex items-center justify-between z-50">
        <a href="{% url 'profile' %}" class="w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 text-gray-600 active:scale-90 transition">
            <i class="fas fa-chevron-left"></i>
        </a>
        <h1 class="font-bold text-gray-800 tracking-tight">Parolni o‘zgartirish</h1>
        <div class="w-10 h-10"></div> </div>

    <main class="pt-24 pb-10 px-5 max-w-md mx-auto">

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-50 rounded-3xl mb-4">
                <i class="fas fa-key text-indigo-600 text-3xl"></i>
            </div>
            <p class="text-sm text-gray-500 font-medium px-6">
                Xavfsizligingizni ta'minlash uchun kuchli paroldan foydalaning.
            </p>
        </div>

        <div class="bg-white rounded-[32px] shadow-xl shadow-gray-200/50 p-6 border border-gray-50">
            <form method="post" class="space-y-2">
                {% csrf_token %}
                
                <div class="django-form-fields">
                    {{ form.as_p }}
                </div>

                <div class="pt-4">
                    <button type="submit"
                        class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white py-4 rounded-2xl text-lg font-bold shadow-lg shadow-indigo-200 active:scale-[0.98] transition-all">
                        Saqlash <i class="fas fa-check-circle ml-2 opacity-70"></i>
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-8 p-4 bg-amber-50 rounded-2xl border border-amber-100 flex gap-3">
            <i class="fas fa-info-circle text-amber-500 mt-1"></i>
            <p class="text-xs text-amber-800 font-medium leading-relaxed">
                Parol o'zgargandan so'ng, barcha qurilmalarda qaytadan tizimga kirishingiz kerak bo'lishi mumkin.
            </p>
        </div>

    </main>

</body>
</html>
