<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muvaffaqiyatli!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f0fdf4; /* Juda och yashil fon */
        }

        .success-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(22, 163, 74, 0.15);
        }

        .check-container {
            position: relative;
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: fire 1.5s ease-out infinite;
        }

        @keyframes fire {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="success-card p-10 w-full max-w-sm text-center border border-green-50">
        
        <div class="check-container mx-auto mb-8 w-24 h-24 bg-green-500 rounded-full flex items-center justify-center shadow-lg shadow-green-200">
            <i class="fas fa-check text-white text-4xl"></i>
            
            <div class="confetti" style="--x: -40px; --y: -40px;"></div>
            <div class="confetti" style="--x: 40px; --y: -40px; animation-delay: 0.2s"></div>
            <div class="confetti" style="--x: -30px; --y: 40px; animation-delay: 0.4s"></div>
            <div class="confetti" style="--x: 35px; --y: 35px; animation-delay: 0.6s"></div>
        </div>

        <h2 class="text-3xl font-black text-gray-800 mb-3 tracking-tight">
            Tayyor!
        </h2>

        <p class="text-gray-500 font-medium leading-relaxed mb-10">
            Parol muvaffaqiyatli o‘zgartirildi. Endi tizimdan xavfsiz foydalanishda davom etishingiz mumkin.
        </p>

        <a href="{% url 'dashboard' %}"
           class="inline-flex items-center justify-center w-full bg-gray-900 text-white py-4 px-6 rounded-2xl text-lg font-bold shadow-xl shadow-gray-200 active:scale-95 transition-all duration-200">
            <i class="fas fa-home mr-3 text-sm opacity-60"></i> Dashboardga qaytish
        </a>

        <p class="mt-6 text-xs text-gray-400 font-bold uppercase tracking-widest">
            Xavfsiz ulanish tasdiqlandi
        </p>
    </div>

</body>
</html>
